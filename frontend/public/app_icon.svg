  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <path d="M232 0H792C920.077 0 1024 103.923 1024 232V360C820 300 620 292 512 292C404 292 204 300 0 360V232C0 103.923 103.923 0 232 0Z" fill="#ffffff" opacity="0.04"/>

  <g transform="translate(0,-14)">
  <!-- Sprout (GDM roots) behind the car -->
  <g opacity="0.9">
    <path d="M512 300 C512 340 512 360 512 392" stroke="#B4BD00" stroke-width="16" stroke-linecap="round"/>
    <path d="M512 340 C470 322 440 330 424 360 C466 372 496 366 512 340 Z" fill="#B4BD00"/>
    <path d="M512 328 C554 306 588 314 606 346 C560 360 528 354 512 328 Z" fill="#CFD83A"/>
  </g>

  <!-- Car -->
  <g>
    <!-- cabin -->
    <path d="M356 452 L406 372 Q416 356 436 356 L590 356 Q612 356 624 375 L672 452 Z" fill="#FFFFFF"/>
    <!-- windows -->
    <path d="M430 440 L462 390 L506 390 L506 440 Z" fill="#B4BD00"/>

    <rect x="720" y="470" width="34" height="28" rx="12" fill="#B4BD00"/>
    <!-- wheels -->
    <circle cx="378" cy="560" r="62" fill="#0B1620"/>
    <circle cx="378" cy="560" r="27" fill="#CFD83A"/>
    <circle cx="612" cy="560" r="62" fill="#0B1620"/>
    <circle cx="612" cy="560" r="27" fill="#CFD83A"/>
  </g>

  <!-- Check badge (reservation approved / checklist ok) -->
  <g>
    <circle cx="708" cy="678" r="104" fill="url(#lime)" stroke="#071F2C" stroke-width="16"/>
    <path d="M660 680 L694 716 L760 636" stroke="#071F2C" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

name: gdm_job_cars_mobile
description: App mobile GDM para gestao de Job Cars e maquinas agricolas.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.2.7
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^6.0.5
  fluttertoast: ^8.2.8
  crypto: ^3.0.6
  intl: ^0.19.0
  timezone: ^0.9.4
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4
  google_fonts: ^8.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#092A3B"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  web:
    generate: false

flutter_native_splash:
  color: "#092A3B"
  image: assets/branding/mark.png
  android_12:
    color: "#092A3B"
    image: assets/branding/mark.png
  fullscreen: true
